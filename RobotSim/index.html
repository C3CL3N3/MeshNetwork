<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoRa Rover Simulator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #060c14;
      color: #c9d1d9;
      font-family: 'SF Mono', 'Fira Code', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      gap: 12px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.8rem;
      color: #8b949e;
      width: 100%;
      max-width: 1060px;
    }
    header h1 { font-size: 1rem; color: #e6edf3; letter-spacing: 1px; }
    .main-row {
      display: flex;
      gap: 14px;
      width: 100%;
      max-width: 1060px;
      align-items: flex-start;
    }
    canvas {
      border: 1px solid #21262d;
      border-radius: 6px;
      display: block;
      flex-shrink: 0;
    }
    .side-panel { display: flex; flex-direction: column; gap: 12px; min-width: 220px; flex: 1; }
    .panel { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 12px; }
    .panel-title { font-size: 0.65rem; color: #58a6ff; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .stat { background: #161b22; border-radius: 4px; padding: 6px 8px; }
    .stat-label { font-size: 0.55rem; color: #8b949e; letter-spacing: 0.5px; }
    .stat-value { font-size: 0.9rem; color: #e6edf3; margin-top: 2px; }
    .kbd-grid {
      display: grid;
      grid-template-columns: repeat(3, 38px);
      grid-template-rows: repeat(2, 38px);
      gap: 4px;
      justify-content: center;
    }
    .key {
      width: 38px; height: 38px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; color: #8b949e;
      transition: background 0.08s, color 0.08s, border-color 0.08s;
      user-select: none;
    }
    .key.active { background: #1f6feb; border-color: #58a6ff; color: #fff; }
    .key-space {
      width: 100%; height: 30px; margin-top: 4px;
      font-size: 0.6rem; letter-spacing: 1px;
    }
    .kbd-hint { font-size: 0.6rem; color: #8b949e; text-align: center; margin-top: 8px; }
    .serial-controls { display: flex; gap: 6px; margin-bottom: 8px; }
    button {
      background: #21262d; border: 1px solid #30363d; border-radius: 4px;
      color: #c9d1d9; padding: 5px 10px; font-size: 0.7rem;
      font-family: inherit; cursor: pointer; transition: background 0.15s;
    }
    button:hover { background: #2d333b; }
    button.primary { background: #1f6feb; border-color: #388bfd; color: #fff; }
    button.primary:hover { background: #388bfd; }
    button:disabled { opacity: 0.4; cursor: default; }
    .serial-log {
      background: #0a0f18; border: 1px solid #21262d; border-radius: 4px;
      height: 110px; overflow-y: auto; padding: 6px;
      font-size: 0.6rem; color: #7ee787; line-height: 1.7;
      white-space: pre-wrap;
    }
    #btn-reset { width: 100%; }
    @media (max-width: 880px) { .main-row { flex-direction: column; align-items: center; } }
  </style>
</head>
<body>

<header>
  <span style="color:#ff6b35;font-size:1.1rem">&#x1F4E1;</span>
  <h1>LORA ROVER SIM</h1>
  <span style="margin-left:auto;font-size:0.7rem">ESP32-S3 · Web Serial · keyboard focus: click canvas</span>
</header>

<div class="main-row">
  <canvas id="canvas" width="780" height="560" tabindex="0"></canvas>

  <div class="side-panel">
    <div class="panel">
      <div class="panel-title">Status</div>
      <div class="status-grid">
        <div class="stat"><div class="stat-label">ACTION</div><div class="stat-value" id="st-action" style="color:#00e5ff">STOP</div></div>
        <div class="stat"><div class="stat-label">SPEED</div><div class="stat-value" id="st-speed" style="color:#7ee787">2.5</div></div>
        <div class="stat"><div class="stat-label">X</div><div class="stat-value" id="st-x">390</div></div>
        <div class="stat"><div class="stat-label">Y</div><div class="stat-value" id="st-y">280</div></div>
        <div class="stat"><div class="stat-label">HEADING</div><div class="stat-value" id="st-angle">270°</div></div>
        <div class="stat"><div class="stat-label">SOURCE</div><div class="stat-value" id="st-source">KB</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Keyboard</div>
      <div class="kbd-grid">
        <div></div>
        <div class="key" id="key-w">W</div>
        <div></div>
        <div class="key" id="key-a">A</div>
        <div class="key" id="key-s">S</div>
        <div class="key" id="key-d">D</div>
      </div>
      <div class="key key-space" id="key-space">SPACE — STOP</div>
      <div class="kbd-hint">+/- speed &nbsp;·&nbsp; R reset &nbsp;·&nbsp; click canvas first</div>
    </div>

    <div class="panel">
      <div class="panel-title">LoRa / Serial (ESP32-S3)</div>
      <div class="serial-controls">
        <button class="primary" id="btn-connect">Connect</button>
        <button id="btn-disconnect" disabled>Disconnect</button>
      </div>
      <div class="serial-log" id="serial-log">Awaiting connection…
</div>
    </div>

    <button id="btn-reset">Reset Rover</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
