<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMP 4531 IoT Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="app-container">

        <header class="glass-bar">
            <div class="brand">
                <div class="logo-icon">COMP 4531</div>
                <span>IoT and Smart Sensing</span>
            </div>
            <nav class="segmented-control">
                <button class="nav-btn active" onclick="setTab('home')">Connect</button>
                <button class="nav-btn" onclick="setTab('lora')">LoRa</button>
                <button class="nav-btn" onclick="setTab('mesh')">Mesh</button>
            </nav>
        </header>

        <!-- ══ CONNECT ══════════════════════════════════════════════════════ -->
        <section id="view-home" class="view-section active">
            <div class="card center-card">
                <h2>Connection Setup</h2>
                <p class="subtitle">Enter your group number to pair with your device.</p>

                <div class="input-group">
                    <label>Group ID</label>
                    <input type="number" id="gid" value="" min="1" max="30">
                </div>

                <div class="action-row">
                    <button id="conBtn" class="btn-primary" onclick="connect()">Connect</button>
                    <button id="disBtn" class="btn-destructive" onclick="disconnect()" disabled>Disconnect</button>
                </div>

                <div class="status-indicator">
                    <div id="statusDot" class="dot"></div>
                    <span id="connStatus">Disconnected</span>
                </div>

                <div class="terminal-window">
                    <div id="terminal">System Ready...</div>
                </div>
            </div>
        </section>

        <!-- ══ LORA ══════════════════════════════════════════════════════════ -->
        <section id="view-lora" class="view-section">
            <div class="card chat-card">
                <div class="card-header">
                    <h3>LoRa Messenger</h3>
                    <span id="loraBadge" class="badge">--- MHz</span>
                </div>

                <div class="lora-controls">
                    <button class="btn-secondary small" onclick="downloadLoraCSV()">Download CSV</button>
                </div>

                <div id="loraGraphPanel" style="display:none; padding:16px; border-bottom:1px solid rgba(0,0,0,0.06); background:rgba(245,245,247,0.4);">
                    <div class="graph-card" style="box-shadow:none; border:1px solid rgba(0,0,0,0.1);">
                        <div class="graph-header">
                            <span>Signal Strength vs Distance</span>
                            <div class="legend">
                                <span class="dot" style="background:var(--primary)"></span>LoRa
                            </div>
                        </div>
                        <canvas id="loraChartCanvas" style="height:140px; background:transparent;"></canvas>
                    </div>
                </div>

                <div id="loraChat" class="chat-area">
                    <div class="chat-placeholder">No messages yet…</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="loraTxt" placeholder="Send '1 meter', '5m', etc. to plot…">
                    <button class="btn-send" onclick="sendLoRa()">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- ══ MESH NETWORK ══════════════════════════════════════════════════ -->
        <section id="view-mesh" class="view-section">
            <aside class="glass-sidebar">
                <h3 style="margin:0 0 20px; font-size:18px; letter-spacing:-0.02em;">Mesh Network</h3>

                <div class="stats-container">
                    <div class="stat-item">
                        <span class="label">My Node</span>
                        <span class="value" id="meshMyNodeId">—</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">Frequency</span>
                        <span class="value" id="meshFreq">— MHz</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">Nodes Seen</span>
                        <span class="value" id="meshNodeCount">0</span>
                    </div>
                    <div class="stat-item highlight">
                        <span class="label">Messages</span>
                        <span class="value" id="meshMsgCount">0</span>
                    </div>
                </div>

                <div class="mesh-send-row">
                    <input type="text" id="meshMsgInput" placeholder="Broadcast message…"
                           onkeydown="if(event.key==='Enter') sendMesh()">
                    <button class="btn-primary small" onclick="sendMesh()">Send</button>
                </div>

                <div class="mesh-node-section">
                    <div class="mesh-section-label">Discovered Nodes</div>
                    <div id="meshNodeList"></div>
                </div>
            </aside>

            <main class="mesh-main">
                <canvas id="meshCanvas"></canvas>
                <div id="meshLog"></div>
            </main>
        </section>

    </div>

    <script src="script.js"></script>
</body>

</html>
